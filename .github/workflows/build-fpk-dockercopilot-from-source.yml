name: build-fpk-dockercopilot

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'fpk-dockercopilot/**'
      - 'fnpack.json'
      - '.github/workflows/build-fpk-dockercopilot.yml'

concurrency:
  group: fpk-dockercopilot-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install fnpack
        run: |
          set -e
          curl -L -o /tmp/fnpack https://static2.fnnas.com/fnpack/fnpack-1.2.1-linux-amd64
          chmod +x /tmp/fnpack
          sudo install /tmp/fnpack /usr/local/bin/fnpack
          fnpack --help

      # ✨ 新增核心步骤：拉取并配置预编译的产物
      - name: Fetch and arrange Release binaries
        run: |
          set -e
          
          # 1. 获取最新版本号 (去除可能存在的换行符和首字母 v，确保格式纯净，如 2.1.10)
          RAW_VERSION=$(curl -sSL https://raw.githubusercontent.com/ifsherlock/dockerCopilot/refs/heads/latest/version | tr -d '\n\r')
          VERSION=${RAW_VERSION#v} # 如果接口返回带 v (如 v2.1.10)，自动去除 v 变成 2.1.10
          echo "Latest version is: $VERSION"

          # 2. 下载编译好的压缩包
          DOWNLOAD_URL="https://github.com/ifsherlock/dockerCopilot/releases/download/${VERSION}/dockerCopilot-amd64.tar.gz"
          echo "Downloading from: $DOWNLOAD_URL"
          curl -L -o release.tar.gz "$DOWNLOAD_URL"
          
          # 3. 创建临时目录并解压
          mkdir -p temp_release
          tar -xzf release.tar.gz -C temp_release
          echo "解压得到的文件："
          ls -la temp_release/
          
          # 4. 把解压出来的文件，移动到你的 fpk-dockercopilot 骨架中
          # ⚠️ 注意：这里假设了压缩包解压后的结构。如果文件名对不上，你需要在这里微调
          
          # 移动二进制文件
          cp temp_release/dist/linux/amd64/dockerCopilot fpk-dockercopilot/bin/dockerCopilot
          chmod +x fpk-dockercopilot/bin/dockerCopilot
          
          # 移动前端静态资源 (如果你的压缩包里包含了 ui 文件夹)
          mkdir -p fpk-dockercopilot/ui
          cp -r temp_release/ui/* fpk-dockercopilot/ui/ || true
          
          # 移动配置文件等 (如果压缩包里也有的话)
          cp -r temp_release/config/* fpk-dockercopilot/bin/config/ || true
          cp temp_release/etc/dockerCopilot.yaml fpk-dockercopilot/bin/etc/dockerCopilot.yaml || true

      # 骨架完整性校验（现在所有文件都已就位，不会再报错了）
      - name: Validate package skeleton
        run: |
          set -e
          test -f fpk-dockercopilot/manifest
          test -f fpk-dockercopilot/bin/config/config.json
          test -f fpk-dockercopilot/bin/etc/dockerCopilot.yaml
          test -f fpk-dockercopilot/bin/dockerCopilot
          test -f fpk-dockercopilot/ui/index.html
          test -d fpk-dockercopilot/cmd
          test -d fpk-dockercopilot/config
          test -d fpk-dockercopilot/wizard

      - name: Build FPK
        working-directory: fpk-dockercopilot
        run: |
          set -e
          fnpack build --directory .
          ls -lh *.fpk

      - name: Compute SHA256
        working-directory: fpk-dockercopilot
        run: |
          set -e
          sha256sum *.fpk | tee SHA256SUMS.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fpk-dockercopilot
          path: |
            fpk-dockercopilot/*.fpk
            fpk-dockercopilot/SHA256SUMS.txt

      - name: Publish package to release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # 这里从你刚刚填好的 manifest 里读取版本号发布
          VERSION=$(grep '^version=' fpk-dockercopilot/manifest | head -n1 | cut -d'=' -f2- | tr -d '\r')
          test -n "$VERSION"
          TAG="fpk-dockercopilot-v${VERSION}"
          TITLE="fpk-dockercopilot ${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release exists: $TAG"
          else
            gh release create "$TAG" --title "$TITLE" --notes "Automated FPK package release for Docker Copilot ${VERSION}."
          fi
          gh release upload "$TAG" fpk-dockercopilot/*.fpk fpk-dockercopilot/SHA256SUMS.txt --clobber
