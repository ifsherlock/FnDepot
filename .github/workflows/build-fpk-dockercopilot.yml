name: build-fpk-dockercopilot

on:
  workflow_dispatch:

concurrency:
  group: fpk-dockercopilot-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install fnpack
        run: |
          set -e
          curl -L -o /tmp/fnpack https://static2.fnnas.com/fnpack/fnpack-1.2.1-linux-amd64
          chmod +x /tmp/fnpack
          sudo install /tmp/fnpack /usr/local/bin/fnpack
          fnpack --help

      - name: Validate manual package input
        run: |
          set -e
          test -f fpk-dockercopilot/manifest
          test -f fpk-dockercopilot/bin/config/config.json
          test -f fpk-dockercopilot/bin/etc/dockerCopilot.yaml
          test -f fpk-dockercopilot/bin/dockerCopilot
          test -f fpk-dockercopilot/ui/index.html
          test -d fpk-dockercopilot/cmd
          test -d fpk-dockercopilot/config
          test -d fpk-dockercopilot/wizard
          echo "Manual packaging prerequisites are present."

      - name: Build FPK
        working-directory: fpk-dockercopilot
        run: |
          set -e
          fnpack build --directory .
          ls -lh *.fpk

      - name: Compute SHA256
        working-directory: fpk-dockercopilot
        run: |
          set -e
          sha256sum *.fpk | tee SHA256SUMS.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fpk-dockercopilot
          path: |
            fpk-dockercopilot/*.fpk
            fpk-dockercopilot/SHA256SUMS.txt

      - name: Publish package to release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION=$(grep '^version=' fpk-dockercopilot/manifest | head -n1 | cut -d'=' -f2- | tr -d '\r')
          test -n "$VERSION"
          TAG="fpk-dockercopilot-v${VERSION}"
          TITLE="fpk-dockercopilot ${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release exists: $TAG"
          else
            gh release create "$TAG" --title "$TITLE" --notes "Manual FPK package release for Docker Copilot ${VERSION}."
          fi
          gh release upload "$TAG" fpk-dockercopilot/*.fpk fpk-dockercopilot/SHA256SUMS.txt --clobber
